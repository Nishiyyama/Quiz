        { text: "O princípio vital repousa no pressuposto arquitetural de que o sujeito que emite o evento conhece os seus múltiplos receptores exclusivamente apoiando-se na via abstrata unificadora das suas interfaces (ex: a subscrição de listas puras de objetos 'IObserver'), ignorando liminarmente os nomes e as concretizações reais estruturais estritas da totalidade das classes concretas que reagem passivamente na sua lista base.", correct: true, rat: "Permite ativamente e de forma elegante expandir e inserir no tempo infinitos ouvintes originais díspares num botão (uma tabela orgânica nova base isolada, um emissor paralelo subjacente sonoro e orgânico ou mesmo o gravador base contínuo do log temporal) sem adulterar um único parágrafo do componente botão original." },
        { text: "Deriva ativamente da adoção contínua subjacente e rigorosa contínua do princípio da estrita conversão do motor num Proxy originário base paralelo associado de limitação estática passiva originária fechada contínua, onde apenas métodos de acesso virtual da camada paralela secundária base interagem livremente nas camadas primárias assíncronas originais.", correct: false, rat: "Acoplamento baixo no Observer provém primordialmente estrito orgânico base da relação polimórfica abstrata contínua originária, o Proxy não tem aqui papel nativo isolado associativo estrutural restritivo primário paralelo associado isolado na essência teórica aplicacional fechada orgânica contínua da intenção." },
        { text: "Acontece inevitavelmente na premissa originária passiva estrutural de que a classe passiva estrita relacional do gerador (Sujeito) mantém e clona permanentemente instâncias associativas completas restritivas do seu estado temporal originário abstrato para os observadores, utilizando as métricas orgânicas abstratas passivas nativas de Prototype original estrutural isolado secundário para barrar conflitos isolados contínuos de concorrência relacional abstrata passiva associativa fechada.", correct: false, rat: "Concorrência nas chamadas passivas abstratas base originais constitui domínio paralelo subjacente estrito, mas não é a força central base originária motriz estrutural contínua associada primária orgânica que diminui a dependência semântica estrita relacional e o acoplamento entre originador e a sua plateia passiva." },
        { text: "Decorre ininterruptamente e resulta forçosamente do aspecto passivo centralizado base onde tanto origens quanto dependentes base relacionais subscrevem e repassam ininterruptamente as rotinas ativas passivas subjacentes relacionais fechadas na arquitetura por intermédio das Árvores Associativas passivas de Composição original base do padrão Facade fechado nativo originário subjacente temporal do servidor paralelo secundário passivo original do cliente.", correct: false, rat: "A fusão contínua orgânica passiva descrita na hipótese remete os termos para outras matrizes subjacentes estritas nativas arquiteturais associativas fechadas que nada interligam no baixo grau estrutural relacional de dependência garantido no núcleo base pela interface do design estrito do Observer e Sujeito passivo." }
    ]},

    // 20. State
    { p: "State", d: "Fácil", q: "Qual das seguintes frases espelha ativamente e da forma mais genérica a essência estrutural base do uso do Padrão GoF originário conhecido por State?", options: [
        { text: "É utilizado de modo a garantir e permitir estritamente que as instâncias da estrutura objeto alternem de modo profundo as premissas primárias e lógicas do seu comportamento orgânico interno em exata conformidade da base restrita paralela com a mudança originária passiva do seu valor e estado transacional dinâmico mantido abstratamente na matriz fechada associada original.", correct: true, rat: "Para os elementos passivos clientes externos isolados nativos originais a alteração contínua reflete ativamente a presunção original subjacente contínua que o objeto inicial nativo base na prática transmuta originariamente e muda ciclicamente e instintivamente de classe nativa estrita primária no momento em tempo originário real." },
        { text: "Permite ativamente e simplifica originariamente e garante isolar a estruturação de uma panóplia estática contínua confusa base nativa secundária original isolada orgânica da arquitetura passiva originária matriz em processos de sintaxe estática da interface base limpa estrutural passiva central.", correct: false, rat: "Descreve fundamentalmente e espelha a arquitetura original primária estrita subjacente de atuação primária originária passiva paralela atribuída inegavelmente associada à Facade." },
        { text: "Consiste numa ferramenta restritiva da matriz associativa contínua orgânica passiva projetada ativamente para processar ativamente transformações originárias fechadas paralelas rigorosas em instâncias e esquemas complexos nas Árvores de XML da linguagem primária em documentos isolados base orgânicos subjacentes secundários associativos fechados no formato universal estrutural paralelo abstrato orgânico transitório passivo abstrato puro de JSON.", correct: false, rat: "Procedimentos inerentes passivos da conversão base das linguagens da matriz de formatação remetem invariavelmente os fluxos para as bases estritas relacionais paralelas de adaptação orgânica das portas das frameworks do Adapter paralelo nativo fechado passivo estático ou Builder orgânico transitório." },
        { text: "Garante e assegura estruturalmente na matriz originária contínua a ligação do componente da vista passiva (View nativa original relacional do repositório) numa amarra forte estrutural base originária nativa com as propriedades passivas dinâmicas e contínuas fechadas abstratas relacionais associativas passivas locais dos repositórios nativos dos dados estritos do Model primário.", correct: false, rat: "As amarras base nativas contínuas das views e o compartilhamento relacionam os preceitos ativamente contínuos dos mecanismos originais relacionais fechados estritos inerentes das tecnologias e pilares nativos de Data Binding nos padrões de macro-arquitetura nativos das famílias paralelas estritas isoladas passivas MVVM ou MVC originais do cliente." }
    ]},
    { p: "State", d: "Médio", q: "Ao olharmos para a estrutura inicial de um código fonte que nunca utilizou padrões e tencionamos aplicar arquiteturalmente o padrão comportamental State na aplicação contínua fechada orgânica nativa; que tipo estrito original relacional de grandes anomalias lógicas passivas na matriz passamos nós ativamente e sistematicamente a conseguir eliminar?", options: [
        { text: "Garante nativamente e facilita de forma clara a extração orgânica estrutural contínua subjacente e base abstrata estrita original da panóplia imensa relacional abstrata passiva e infindável dos encadeamentos fechados condicionais em árvore paralela originária (estruturas gigantes de 'if-else' base ou amálgamas intermináveis nativas originárias estáticas de 'switch-case').", correct: true, rat: "Desta forma passiva cada braço do condicional migra associativamente estritamente num percurso orgânico contínuo paralelo da matriz para compor o núcleo fechado exclusivo nativo do componente do método isolado focado na respectiva classe nativa associada relacional original fechada representativa estrita de Base de Estado subjacente abstrato secundário." },
        { text: "Dilui ativamente na origem estrutural base das matrizes o excesso gerado nos sistemas assíncronos geradores de lógicas complexas nativas em ciclos rotativos fechados orgânicos ininterruptos restritos estáticos de Base While True nos eventos geradores de rede da estrutura base orgânica temporária relacional.", correct: false, rat: "Loops infindáveis passivos abstratos base estritos isolados requerem mecanismos ativamente relacionados com a implementação passiva original do tratamento das origens associativas orgânicas paralelas assíncronas no contexto reativo dos canais ou a via originária de Thread Pools fechados estruturais secundários nativos, muito distantes conceitualmente das esferas associadas estritas base do padrão State original." },
        { text: "Descomplica na rede relacional base contínua estática a alocação nativa originária paralela fechada de dados repetitivos nos acessos secundários ininterruptos ao log nativo gerido no motor original do arquivo estrito passivo restritivo fechado da arquitetura nativa local secundária das classes passivas do host relacional temporário da máquina abstrata da framework local de base passiva estrutural central.", correct: false, rat: "O desentupimento da fila de acessos base de escrita recai estritamente sob abordagens associativas locais do proxy nativo relacional fechado de fluxo ou filas orgânicas contínuas nativas do Command puro de base isolado contínuo associado no host nativo estrito da memória passiva abstrata temporária do servidor original fechado relacional secundário passivo base da plataforma contínua estática local estrutural." },
        { text: "A substituição em tempo de compilação da criação base original estrita de instâncias globais associadas no núcleo de tela fechada da rede paralela matriz do código orgânico estrito em substitutos temporários originais passivos secundários contínuos nativos das frameworks estáticas base originárias subjacentes fechadas das classes originais fechadas locais abstratas restritivas.", correct: false, rat: "Mudanças originárias em momento abstrato base de compilação da origem estrita nas instâncias relativas englobam as normas das arquiteturas estritas associadas passivas primárias geradoras do domínio subjacente fechado paralelo criacional da lógica isolada estrita originária no motor Factory abstrato originário." }
    ]},

    // 21. Strategy
    { p: "Strategy", d: "Fácil", q: "Qual a frase de intenção clássica do GoF que melhor condensa ativamente a definição da função central matriz da arquitetura do padrão Strategy?", options: [
        { text: "Tem como missão formular e criar conceitualmente as bases fechadas associativas contínuas e definir num pacote unificado uma família isolada abstrata inteira com inúmeros algoritmos, mantendo o processo relacional de os guardar de forma limpa estrita individual em encapsulamentos nativos separados com vista a podermos posteriormente usar e intercambiá-los organicamente perante um contexto sem constrangimentos.", correct: true, rat: "Garante-nos a autonomia passiva de forma a deixar passivamente atuar num método de ordenação interno (MergeSort contínuo ou QuickSort relacional) e mudá-lo de imediato com um toque simples da mão restritiva do código cliente no núcleo fechado orgânico paralelo nativo independente da instância matriz subjacente estrutural de base nativa associada original abstrata sem interferências nativas da classe contextual." },
        { text: "Empacotar as instâncias hierárquicas secundárias estritas em bases fechadas recursivas estruturadas passivamente em modo orgânico nativo fechado base nativo contínuo e ordenado relacional contínuo numa classe originária de ramos agrupadores contínuos passivos nativos originais abstratos fechados em árvore.", correct: false, rat: "Reflete forçosamente de forma inabalável os princípios arquiteturais estruturais orgânicos base e nativos dos padrões Composite das bases relacionais abstratas associativas primárias." },
        { text: "Criar de imediato as proteções isoladas de recursos base voláteis ao encapsular os recursos relacionais abstratos estritos originais e instâncias voláteis matriz originais imutáveis paralelas base da arquitetura secundária no interior central passivo da lógica associativa de segurança e rede fechada nativa originária paralela do servidor host original da aplicação nativa principal estática originária abstrata temporal contínua associada primária fechada estrutural.", correct: false, rat: "Refere-se ao modelo conceitual de restrição subjacente do padrão Singleton ou restrições nativas base orgânicas do padrão originário Proxy estático." },
        { text: "Cobrir de adornos as matrizes relacionais contínuas passivas de origem e envolver as rotinas de comportamento abstratas isoladas contínuas das estruturas da camada paralela externa fechada abstrata na interface base unificadora relacional orgânica estrita originária sem poluir a class de origem nativa passiva contínua secundária restrita abstrata base original estrita primária temporal local isolada contínua nativa.", correct: false, rat: "Conceito estrutural ligado invariavelmente ao encapsulamento original passivo abstrato de aumento e decoração passiva nativa originária do formato estático base do Decorator estrito nativo." }
    ]},
    { p: "Strategy", d: "Médio", q: "No contexto mais amplo da engenharia, o Strategy tem um efeito profundo focado sobretudo em alterar as entranhas dos métodos na execução da classe. Se procurássemos o oposto e optássemos em vez disso focar a abordagem originária apenas de base exterior na pele para enriquecer dinamicamente as classes de fora; que outro padrão atua aí sem ferir ativamente o interior orgânico contínuo restrito?", options: [
        { text: "O arquétipo originário associado diretamente ao formato estrutural estrito gerado do Decorator; pois na justa medida em que as estratégias alteram orgânica e primariamente a matriz nativa do miolo originário relacional do problema contínuo passivo, as componentes base do adorno limitam-se organicamente a colar anexos e estender por fora a área originária nativa comportamental subjacente originária associada à peça principal originária fechada contínua.", correct: true, rat: "Apesar de injetarem ambos funcionalidades num método dinâmico estrutural originário; um foca-se essencialmente em engolir as peças e anexar camadas novas isoladas (exteriormente e por repetição via interface idêntica passiva), o outro cede o interior restritivo originário na execução nativa central do algoritmo de matriz (por substituição pura e polimórfica originária da via passiva interna)." },
        { text: "O molde arquitetônico estrito passivo originário relacional de Proxy, visto ser estruturalmente exímio e nativamente isolado nas bases de anexação de dinâmicas base secundárias orgânicas originais e originais restrições abstratas ao fluxo originário relacional passivo subjacente associado original nativo contínuo do objeto abstrato principal da via restrita local fechada.", correct: false, rat: "As mecânicas lógicas restritivas baseadas passivamente originárias nos fluxos Proxy visam a contenção, controle cego orgânico originário base e barreira de tempo, nunca agindo para incrementar ou ceder funcionalidade lógica extra." },
        { text: "A classe e via relacional de base abstrata estrita do Mediator, cujos modelos comportamentais originais servem forçosamente estritamente de via de anexo passivo relacional isolado dos dados de controle secundário passivo paralelo para invólucros originários na tela passiva contínua nativa estática originária base da plataforma matriz subjacente temporal associativa fechada da lógica abstrata nativa paralela originária secundária.", correct: false, rat: "Como as diretrizes apontam, este serve de hub e coordena o fluxo paralelo contínuo, assemelhando-se num aspecto restritivo macro de passagem e nunca um incremento singular isolado da vertente nativa da unidade da classe base passiva orgânica temporal local original do repositório estrito associativo paralelo primário." },
        { text: "Não subsistem de todo na matriz originária subjacente do repositório alternativas estáticas originárias passivas que cumpram de certa forma as prerrogativas base estruturais paralelas, dado estarmos na presença originária de um mecanismo abstrato estrito e passivo único fechado orgânico no domínio de injetar comportamentos puros dinâmicos paralelos na camada relacional abstrata estrita.", correct: false, rat: "Ambos os moldes (Decorator e Strategy) competem conceitualmente em injetar de fato as competências contínuas num componente relacional nativo originário passivo no meio de execução, logo o Strategy não subsiste inteiramente desacompanhado nos modelos associativos fechados nativos puros paralelos contínuos das abordagens." }
    ]},

    // 22. Template Method
    { p: "Template Method", d: "Fácil", q: "Qual a fundação da estrutura principal da regra imposta pela classe mestre no molde da arquitetura associativa de base passiva orgânica e abstrata contínua originária relacional nativa da matriz de Template Method?", options: [
        { text: "Delimita e dita rigorosamente as bases primárias contínuas estáticas orgânicas e traça desde a raiz o esqueleto matriz de um método de aplicação base, transferindo simultaneamente e obrigatoriamente para as subclasses nativas estritas secundárias relacionais a incumbência natural orgânica de refinar ou implementar passivamente em exclusivo os detalhes das lacunas abstratas e passivas fechadas.", correct: true, rat: "Ao criar um esqueleto base (exemplo clássico e estrito do relatório: 'abreTabelaBase()', 'imprimeCorpoDetalheAbstrato()', 'fechaRodape()'), protege ininterruptamente a estrutura originária de formatação, permitindo que a variação originária passiva estrita se dê exclusivamente nos buracos nativos estáticos (métodos abstratos criados) e preenchidos pela via de base relacional orgânica das filhas associativas." },
        { text: "Aloca todas as variáveis secundárias estritas originárias da infraestrutura secundária nas filhas nativas relacionais separando ativamente das vias abstratas originais passivas de execução fechadas originais as lógicas estritas de rotas fechadas de base assíncrona temporária isolada do servidor nativo associado originário da plataforma contínua relacional paralela base estrutural temporária primária fechada orgânica estrita nativa.", correct: false, rat: "A delegação base do Builder serve fundamentalmente o propósito de distanciar e fracionar o processo relacional criacional nativo original contínuo da peça visual de montagem orgânica estrita de passos, divergem as bases originárias abstratas relativas dos propósitos da arquitetura fechada originária base de algoritmos contínuos associativos." },
        { text: "Inspeciona linguisticamente e decodifica as premissas lógicas abstratas gramaticais das árvores sintáticas nativas isoladas base orgânicas subjacentes nas classes estritas paralelas abstratas secundárias contínuas base do sistema local estrutural temporário fechado nativo originário primário associativo relacional contínuo do servidor estrito nativo passivo secundário associativo base estrutural passivo originário abstrato temporário paralelo do núcleo.", correct: false, rat: "Domínio exclusivo passivo base e foco estrutural abstrato relacional originário do Interpreter restrito fechado." },
        { text: "Navega nas vias originárias fechadas passivas das coleções de matriz associativa abstrata paralela nativa de formatação local secundária das chaves estritas primárias originárias da memória paralela associada sem transmutar a interface relacional nativa fechada restrita associada orgânica contínua da coleção originária passiva subjacente isolada central abstrata da linguagem base do repositório secundário estrito nativo paralelo original isolado estático contínuo.", correct: false, rat: "Rotina de tráfego linear passivo abstrato base exclusivo e da competência nativa orgânica contínua estrutural da ferramenta e via originária relacional isolada do mecanismo originário de Iterator puro." }
    ]},
    { p: "Template Method", d: "Médio", q: "Ao analisar a anatomia associativa contínua do Template Method deparamo-nos nativamente e frequentemente com o conceito originário estrutural paralelo e relacional apelidado no jargão do código GoF base passivo como 'Hook' (Gancho). Na prática originária associativa, este modelo estrito de método consubstancia-se no quê?", options: [

// Dicionário para pesos das dificuldades (Fácil = 1, Médio = 2, Difícil = 3)
const diffWeight = { "Fácil": 1, "Médio": 2, "Difícil": 3 };

// Função para embaralhar um array (Fisher-Yates)
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

// Lógica de Ordenação
function applySorting(orderType) {
    if (orderType === 'random') {
        shuffle(gofQuestions);
    } else if (orderType === 'asc') {
        // Mais fácil para mais difícil
        gofQuestions.sort((a, b) => diffWeight[a.d] - diffWeight[b.d]);
    } else if (orderType === 'desc') {
        // Mais difícil para mais fácil
        gofQuestions.sort((a, b) => diffWeight[b.d] - diffWeight[a.d]);
    }
}

// Renderização Principal do Quiz
function renderQuestions() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = ''; // Limpar as antigas

    document.getElementById('total-score').innerText = gofQuestions.length;

    gofQuestions.forEach((item, index) => {
        // Embaralhar as alternativas a cada renderização
        shuffle(item.options);

        const card = document.createElement('div');
        card.className = 'card';
        card.id = `q-card-${index}`;

        // Cores do Header de acordo com a Dificuldade
        let headerColor = "bg-primary";
        if (item.d === "Fácil") headerColor = "bg-facil";
        if (item.d === "Médio") headerColor = "bg-medio";
        if (item.d === "Difícil") headerColor = "bg-dificil";

        let optionsHtml = '';
        item.options.forEach((opt, optIndex) => {
            // Gerar a letra (A, B, C, D) de acordo com o índice exibido no momento (optIndex)
            const letter = String.fromCharCode(65 + optIndex); 
            
            optionsHtml += `
                <label class="option-label" id="label-${index}-${optIndex}">
                    <input type="radio" name="q${index}" value="${opt.correct}" data-rat="${opt.rat}" class="form-check-input me-3">
                    <span class="fs-6 text-dark"><span class="letter-prefix">${letter})</span> ${opt.text}</span>
                </label>
            `;
        });

        card.innerHTML = `
            <div class="card-header ${headerColor} d-flex justify-content-between align-items-center p-3">
                <span class="fs-5">Questão ${index + 1}</span>
                <div>
                    <span class="badge bg-light text-dark fw-bold px-3 py-2 border shadow-sm">${item.d}</span>
                    <span class="pattern-badge border shadow-sm text-light fw-bold">${item.p}</span>
                </div>
            </div>
            <div class="card-body p-4 bg-white rounded-bottom">
                <p class="card-text fw-bold fs-5 mb-4 text-dark">${item.q}</p>
                <div class="options-container">
                    ${optionsHtml}
                </div>
                <div class="rationale shadow-sm" id="rat-${index}"></div>
            </div>
        `;
        container.appendChild(card);
    });
}

// Event Listeners para os botões de ordenação
document.querySelectorAll('input[name="btnSort"]').forEach(radio => {
    radio.addEventListener('change', (e) => {
        const answered = document.querySelectorAll('input[type="radio"]:checked').length;
        if (answered > 0) {
            const confirmReset = confirm("Mudar a ordem das questões irá reiniciar o seu progresso atual. Deseja continuar?");
            if (!confirmReset) {
                e.preventDefault();
                return;
            }
        }

        const id = e.target.id;
        let order = 'random';
        if (id === 'sortAsc') order = 'asc';
        if (id === 'sortDesc') order = 'desc';

        applySorting(order);
        renderQuestions();
        
        document.getElementById('current-score').innerText = 0;
        document.getElementById('final-result').classList.add('d-none');
        document.getElementById('floating-score').style.display = 'block';
    });
});

// Listener do Submit de Validação
document.getElementById('quizForm').addEventListener('submit', function(e) {
    e.preventDefault();
    let score = 0;
    
    gofQuestions.forEach((item, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        const rationaleBox = document.getElementById(`rat-${index}`);
        const card = document.getElementById(`q-card-${index}`);

        rationaleBox.style.display = 'block';

        if (selected) {
            const isCorrect = selected.value === "true";
            const selectedLabel = selected.parentElement;

            if (isCorrect) {
                score++;
                selectedLabel.classList.add('correct-answer');
                rationaleBox.innerHTML = `<strong>✅ Correto!</strong> ${selected.getAttribute('data-rat')}`;
                rationaleBox.style.borderLeftColor = "#198754";
                rationaleBox.style.backgroundColor = "#d1e7dd";
            } else {
                selectedLabel.classList.add('incorrect-answer');
                const correctInput = document.querySelector(`input[name="q${index}"][value="true"]`);
                correctInput.parentElement.classList.add('correct-answer');
                rationaleBox.innerHTML = `<strong>❌ Incorreto.</strong> ${correctInput.getAttribute('data-rat')}`;
                rationaleBox.style.borderLeftColor = "#dc3545";
                rationaleBox.style.backgroundColor = "#f8d7da";
            }
        } else {
            const correctInput = document.querySelector(`input[name="q${index}"][value="true"]`);
            correctInput.parentElement.classList.add('correct-answer');
            rationaleBox.innerHTML = `<strong>⚠️ Não respondida.</strong> ${correctInput.getAttribute('data-rat')}`;
            rationaleBox.style.borderLeftColor = "#ffc107";
            rationaleBox.style.backgroundColor = "#fff3cd";
            card.classList.add('border', 'border-warning', 'border-3');
        }
    });

    const totalQuestions = gofQuestions.length;
    const percent = Math.round((score / totalQuestions) * 100);
    
    const resultDiv = document.getElementById('final-result');
    resultDiv.classList.remove('d-none');
    document.getElementById('score-percent').innerText = `${percent}%`;
    document.getElementById('score-text').innerText = `Acertou ${score} de um total de ${totalQuestions} questões submetidas.`;
    
    document.getElementById('floating-score').style.display = 'none';
    
    if(percent >= 80) document.getElementById('score-percent').className = "display-1 fw-bold mb-3 text-success";
    else if(percent >= 50) document.getElementById('score-percent').className = "display-1 fw-bold mb-3 text-warning";
    else document.getElementById('score-percent').className = "display-1 fw-bold mb-3 text-danger";
    
    resultDiv.scrollIntoView({ behavior: 'smooth' });
});

// Inicialização da página
applySorting('random'); // Predefinição
renderQuestions();

// Contagem dinâmica das respondidas para o Placar (Flutuante)
document.addEventListener('change', function(e) {
    if(e.target.type === 'radio' && e.target.name.startsWith('q')) {
        const answered = document.querySelectorAll('input[type="radio"][name^="q"]:checked').length;
        document.getElementById('current-score').innerText = answered;
    }
});
</script>

<script>
// Base de dados das questões focadas em conceitos gerais (Adaptado para pt-BR)
const gofQuestions = [
    // --- CREATIONAL PATTERNS ---
    // 1. Abstract Factory
    { p: "Abstract Factory", d: "Fácil", q: "Qual é o principal objetivo conceitual do padrão Abstract Factory?", options: [
        { text: "Criar famílias de objetos relacionados ou dependentes sem especificar as suas classes concretas.", correct: true, rat: "A intenção é garantir que conjuntos de produtos criados sejam compatíveis entre si." },
        { text: "Fornecer uma forma de criar um objeto deixando as subclasses decidirem a implementação.", correct: false, rat: "Esta é a intenção principal do Factory Method." },
        { text: "Garantir que um sistema mantenha apenas uma instância de uma classe ao longo do seu ciclo de vida.", correct: false, rat: "Esta é a intenção do Singleton." },
        { text: "Separar a construção de um objeto complexo da sua representação visual.", correct: false, rat: "Esta é a intenção do Builder." }
    ]},
    { p: "Abstract Factory", d: "Médio", q: "Ao analisar um diagrama ou arquitetura de software, qual a diferença clássica entre o Abstract Factory e o Factory Method?", options: [
        { text: "O Abstract Factory cria um conjunto inteiro de produtos (uma família), enquanto o Factory Method foca na criação de um único tipo de produto.", correct: true, rat: "O Abstract Factory é uma fábrica de maior nível que geralmente utiliza múltiplos métodos de fábrica na sua estrutura." },
        { text: "O Abstract Factory é utilizado em padrões estruturais e o Factory Method em comportamentais.", correct: false, rat: "Ambos pertencem à classe de Padrões Criacionais." },
        { text: "O Abstract Factory funciona por clonagem de objetos existentes, em vez de usar construtores.", correct: false, rat: "A técnica de clonagem pertence ao padrão Prototype." },
        { text: "Não há diferença arquitetural, são apenas dois nomes para o mesmo conceito.", correct: false, rat: "Apesar de relacionados, têm propósitos de granularidade muito distintos." }
    ]},

    // 2. Builder
    { p: "Builder", d: "Fácil", q: "O padrão Builder é idealmente aplicado em que situação de design de software?", options: [
        { text: "Quando a criação de um objeto exige múltiplos passos, configurações diversas e construções passo a passo.", correct: true, rat: "O Builder é útil quando o construtor normal ficaria grande e complexo demais devido às várias opções de montagem." },
        { text: "Quando se quer garantir que uma classe não possa ser instanciada por clientes diretos.", correct: false, rat: "Restrição de instância está relacionada com o Singleton." },
        { text: "Quando é preciso envolver um objeto com novas características de forma imediata.", correct: false, rat: "Isto se refere à intenção do padrão Decorator." },
        { text: "Quando um cliente precisa que os objetos sejam criados todos ao mesmo tempo em uma única linha.", correct: false, rat: "Isto anula o propósito do Builder, que é precisamente construir por etapas." }
    ]},
    { p: "Builder", d: "Médio", q: "Na estrutura clássica do padrão Builder, qual é a principal responsabilidade do componente 'Director' (Diretor)?", options: [
        { text: "Definir a ordem correta dos passos de construção (o algoritmo de montagem), delegando a fabricação das peças ao Builder.", correct: true, rat: "O Diretor sabe 'como' o objeto final é montado logicamente, enquanto o Builder sabe 'o que' colocar em cada etapa." },
        { text: "Implementar a lógica concreta e o design das peças individuais que vão compor o objeto final.", correct: false, rat: "Esta responsabilidade é exclusiva das classes ConcreteBuilder." },
        { text: "Persistir o objeto final em um banco de dados depois de ele ser montado e validado.", correct: false, rat: "A persistência de dados não faz parte do escopo criacional deste padrão GoF." },
        { text: "Agrupar todas as fábricas abstratas em um só local compartilhado.", correct: false, rat: "Isso é uma confusão estrutural com o Abstract Factory." }
    ]},

    // 3. Factory Method
    { p: "Factory Method", d: "Fácil", q: "No padrão Factory Method, o código da classe criadora delega a instanciação dos objetos para quem?", options: [
        { text: "Para as subclasses que herdam dessa classe criadora, redefinindo o método de fabricação.", correct: true, rat: "A classe mãe dita a interface comum, mas o detalhe do que vai nascer no sistema é responsabilidade das classes filhas." },
        { text: "Para o cliente final que consome o objeto.", correct: false, rat: "O objetivo é precisamente ocultar a instanciação do cliente final." },
        { text: "Para um serviço de arquivos de configuração em XML.", correct: false, rat: "Embora configurações existam, a delegação estrutural do GoF ocorre via herança e polimorfismo." },
        { text: "Para um construtor público e estático chamado internamente.", correct: false, rat: "Isso define uma Fábrica Simples, mas o Factory Method clássico depende de subclasses e métodos virtuais/abstratos." }
    ]},
    { p: "Factory Method", d: "Médio", q: "Como o padrão Factory Method auxilia a implementação do princípio Aberto/Fechado (Open/Closed Principle)?", options: [
        { text: "Permite introduzir novos tipos de produtos na aplicação criando novas subclasses de fábrica, sem necessitar alterar o código principal existente.", correct: true, rat: "Como o sistema principal trabalha apenas com a abstração do produto e do criador, adicionar novos tipos torna-se uma extensão limpa." },
        { text: "Impede que o código possa ser modificado por programadores que não conheçam a estrutura do projeto.", correct: false, rat: "O Princípio Aberto/Fechado refere-se à concepção do código, não a direitos de alteração dos arquivos." },
        { text: "Garante que o objeto retornado nunca possa ser modificado após a sua criação.", correct: false, rat: "A imutabilidade não é o foco do Factory Method." },
        { text: "Obriga que todo o ciclo de criação seja colocado em um único bloco de decisão (switch) fechado.", correct: false, rat: "O objetivo é eliminar a necessidade de grandes blocos 'switch', substituindo-os por herança." }
    ]},

    // 4. Prototype
    { p: "Prototype", d: "Fácil", q: "Qual a abordagem fundamental do padrão Prototype para a criação de instâncias?", options: [
        { text: "Criar novos objetos através da cópia (clonagem) de instâncias originais já existentes.", correct: true, rat: "A ideia é ter um objeto 'protótipo' e obter variantes baseadas nele sem necessitar instanciar e configurar tudo do zero." },
        { text: "Passar a responsabilidade de criação para uma lista de comandos interligados.", correct: false, rat: "Não há relação com a clonagem; remete mais a comandos e delegação." },
        { text: "Modificar a interface estrutural de um objeto velho para parecer um novo.", correct: false, rat: "Isso se refere especificamente ao padrão Adapter." },
        { text: "Garantir a existência de um único protótipo no sistema global.", correct: false, rat: "Isso é uma definição incorreta, confundindo a clonagem de objetos com a restrição global do Singleton." }
    ]},
    { p: "Prototype", d: "Médio", q: "Em que cenário geral a aplicação do padrão Prototype é considerada mais benéfica em termos de design de criação?", options: [
        { text: "Quando a inicialização e configuração de um objeto a partir do zero é significativamente mais complexa e custosa do que simplesmente copiar um estado já existente.", correct: true, rat: "Objetos que requerem muita configuração lógica inicial se beneficiam imensamente da clonagem direta." },
        { text: "Quando precisamos garantir o encapsulamento rígido da hierarquia de classes da empresa.", correct: false, rat: "O Prototype não foi criado para reforçar ou proteger a herança de classes." },
        { text: "Quando todos os objetos do sistema não têm dados de estado e são meramente funções.", correct: false, rat: "Se não há estado para copiar, o Prototype perde totalmente o seu valor intrínseco." },
        { text: "Quando a aplicação é forçada a instanciar componentes visuais em uma interface restrita.", correct: false, rat: "Não existe limitação de aplicação baseada no ambiente de interface gráfica." }
    ]},
    { p: "Prototype", d: "Difícil", q: "Do ponto de vista estrutural, qual é a exigência primordial que um objeto deve cumprir para que seja possível implementar com sucesso o padrão Prototype?", options: [
        { text: "Deve fornecer uma interface que permita a devolução de uma cópia exata de si mesmo, encapsulando os detalhes dessa clonagem.", correct: true, rat: "O cliente do protótipo não deve conhecer os detalhes de como o objeto se copia (os atributos que possui); apenas precisa invocar o método `clone()`." },
        { text: "Deve implementar todos os métodos nativos de serialização do sistema operacional.", correct: false, rat: "A serialização é uma técnica comum para fazer cópias em algumas linguagens, mas não é a exigência estrutural estrita do padrão no GoF." },
        { text: "O objeto não pode ter associações com nenhum outro objeto secundário em sua estrutura.", correct: false, rat: "Protótipos podem ter estruturas complexas e dependências internas, cabendo à classe gerenciar como se clonar." },
        { text: "O objeto tem de herdar obrigatoriamente de um Singleton principal da infraestrutura.", correct: false, rat: "Singleton e Prototype são conceitos criacionais paralelos; não há obrigatoriedade de cruzamento." }
    ]},

    // 5. Singleton
    { p: "Singleton", d: "Fácil", q: "Qual é a intenção base do padrão Singleton na arquitetura de software?", options: [
        { text: "Assegurar que uma classe possua uma única instância no sistema e proporcionar um ponto de acesso global a ela.", correct: true, rat: "Ideal para componentes como controladores de gerenciamento de logs ou drivers que administram configurações da aplicação." },
        { text: "Tornar as instâncias globais independentes e imunes a quaisquer modificações.", correct: false, rat: "Não existe regra no padrão que torne o objeto imutável, apenas que a sua instância seja única." },
        { text: "Clonar globalmente o mesmo comportamento sem compartilhar os dados intrínsecos.", correct: false, rat: "Isso define melhor o padrão Flyweight, focado no compartilhamento otimizado." },
        { text: "Reduzir o tamanho do código ao mínimo necessário, evitando a criação de interfaces.", correct: false, rat: "O Singleton não existe com o objetivo de reduzir o volume das classes." }
    ]},
    { p: "Singleton", d: "Médio", q: "Qual é a crítica conceitual mais comum a se apontar ao padrão Singleton no contexto de um design limpo?", options: [
        { text: "Ele introduz um acoplamento forte devido à existência de um estado global compartilhado, o que viola o conceito de modularidade e isolamento de componentes.", correct: true, rat: "A sua natureza global mascara dependências entre as classes e torna a compreensão do fluxo de dados muito mais obscura." },
        { text: "Impede completamente que as linguagens compilem o código de forma rápida e otimizada.", correct: false, rat: "O impacto no tempo de compilação ou de performance por causa deste padrão é, em regra, irrelevante." },
        { text: "Não é suportado por linguagens de programação que sigam os paradigmas de Orientação a Objetos.", correct: false, rat: "Acontece precisamente o contrário; o padrão foi idealizado pensando em classes e objetos." },
        { text: "Obriga o cliente a definir múltiplas instâncias temporárias para acessar o valor real.", correct: false, rat: "A premissa do padrão é justamente evitar a possibilidade de haver mais do que uma instância." }
    ]},
    { p: "Singleton", d: "Difícil", q: "Em muitas literaturas de arquitetura modernas (nomeadamente no uso de Injeção de Dependência), o Singleton é frequentemente classificado como um 'anti-padrão'. Qual o maior argumento estrutural que sustenta essa visão?", options: [
        { text: "Porque esconde as dependências vitais de uma classe no seu interior, reduzindo a clareza arquitetural e dificultando enormemente a criação e o uso de Mocks em testes unitários automatizados.", correct: true, rat: "Ao invocar `ClasseX.getInstance()` dentro de uma função, essa função passa a depender rigidamente da classe real global, sendo penoso substituí-la por uma versão simulada para testar o código isoladamente." },
        { text: "Porque obriga a instanciar classes secundárias vazias (dummy classes) na memória da aplicação, violando as normas de eficiência.", correct: false, rat: "A Injeção de Dependência lida muito bem com memórias e instâncias; a queixa é o acoplamento, não a memória nula." },
        { text: "Visto que o padrão obriga o uso desmedido de herança de interfaces baseadas em Factory Method para poder ser instanciado.", correct: false, rat: "O Singleton não exige heranças extensas, frequentemente não possui herança alguma." },
        { text: "Como as variáveis são forçosamente estáticas, o sistema deixa de poder realizar ligações em tempo de compilação (Early Binding).", correct: false, rat: "Terminologia inadequada sobre carregamento de linguagens que não reflete a dor central arquitetural do Singleton nos sistemas atuais." }
    ]},

    // --- STRUCTURAL PATTERNS ---
    // 6. Adapter
    { p: "Adapter", d: "Fácil", q: "Qual analogia do mundo físico descreve mais fielmente a intenção do padrão Adapter?", options: [
        { text: "Um adaptador de viagem que permite ligar o plugue europeu de um aparelho em uma tomada de parede de modelo americano.", correct: true, rat: "A intenção é transformar uma interface em uma outra diferente de modo a compatibilizar dois lados distintos que, por si, não se encaixariam." },
        { text: "Uma fábrica de montagem que produz consistentemente o mesmo modelo de rádio.", correct: false, rat: "Esta é a metáfora comum que se atribui a fábricas como o Factory Method ou Abstract Factory." },
        { text: "Um guarda de trânsito que coordena as entradas e saídas e os fluxos de automóveis em um cruzamento complexo.", correct: false, rat: "Este seria o melhor exemplo visual para o padrão Mediator." },
        { text: "Um invólucro ou fita colorida que se coloca para decorar a superfície do cabo elétrico, sem lhe mudar a ponta.", correct: false, rat: "Refere-se muito mais ao padrão Decorator do que à adaptação de forma." }
    ]},
    { p: "Adapter", d: "Médio", q: "O GoF apresenta o padrão Adapter dividido conceitualmente em duas grandes variações estruturais. Quais são essas abordagens?", options: [
        { text: "Adapter baseado em herança múltipla de classes (Adapter de Classe) e Adapter baseado na composição de objetos (Adapter de Objeto).", correct: true, rat: "A versão Classe exige linguagem com herança múltipla, enquanto a versão Objeto funciona por associação ao referenciar uma instância da classe adaptada no seu interior." },
        { text: "Adapter Assíncrono para bancos de dados e Adapter Síncrono para interface gráfica.", correct: false, rat: "A diferenciação síncrona/assíncrona refere-se ao tempo de execução das ações, não a categorias estruturais." },
        { text: "Adapter Mestre (Master) e Adapter Escravo (Slave).", correct: false, rat: "Esta categorização serve para padrões arquiteturais de infraestruturas paralelas, ausentes no conceito clássico do GoF." },
        { text: "Adapter Interno para classes protegidas e Adapter Externo para classes públicas compartilhadas.", correct: false, rat: "Não é uma categorização do padrão; o padrão foca-se simplesmente nas interfaces públicas." }
    ]},
    { p: "Adapter", d: "Difícil", q: "Considerando que tanto o padrão Adapter quanto o Decorator atuam como invólucros (wrappers) na arquitetura, qual é a verdadeira distinção arquitetural de intenção que os separa definitivamente?", options: [
        { text: "O Adapter muda e converte a interface do objeto para resolver incompatibilidades com o cliente, enquanto o Decorator faz obrigatoriamente questão de manter a MESMA interface intacta ao mesmo tempo que injeta novas responsabilidades lógicas.", correct: true, rat: "A chave reside na Interface: O Adapter procura mudar a forma, o Decorator apenas enriquece o comportamento base mantendo a mesma assinatura." },
        { text: "O Adapter atua sempre no início do desenvolvimento e desenha a interface do zero; o Decorator só entra mais tarde no processo.", correct: false, rat: "Pelo contrário, o Adapter é frequentemente usado muito mais tarde para fazer classes antigas (legadas) se comunicarem com coisas recentes sem ser preciso refatorar." },
        { text: "Apenas o Adapter tem permissão teórica para lidar com classes herdadas da fábrica de objetos primários.", correct: false, rat: "Os padrões não têm regras tão limitativas; ambos podem se comunicar e interligar com fábricas se o design assim ditar." },
        { text: "Não existem diferenças arquiteturais entre os dois na prática, o GoF utilizou as duas terminologias de acordo com o nível sintático que o programador decide abordar.", correct: false, rat: "Têm intenções arquiteturais e de comunicação categoricamente opostas." }
    ]},

    // 7. Bridge
    { p: "Bridge", d: "Fácil", q: "O objetivo principal e estrutural do padrão Bridge é procurar separar dois componentes fundamentais. Quais?", options: [
        { text: "A abstração conceitual da sua implementação real, garantindo que possam variar ao longo do tempo de forma independente uma da outra.", correct: true, rat: "Favorece a utilização da composição em vez da herança clássica para dar margem a ramificações distintas no projeto." },
        { text: "O frontend do backend da aplicação moderna, usando serviços intermediários.", correct: false, rat: "Apesar de haver pontes lógicas, o padrão foca na arquitetura das classes internas, não no plano macro das redes das aplicações web." },
        { text: "O algoritmo construtor da versão montada do objeto final pronto a usar.", correct: false, rat: "Esse é o trabalho criacional isolado efetuado pelo Builder." },
        { text: "As interfaces legadas complexas em um sistema novo simplificado.", correct: false, rat: "Isto faria mais sentido na adoção de um Adapter ou na criação de um Facade geral." }
    ]},
    { p: "Bridge", d: "Médio", q: "Qual o grande e clássico dilema de arquitetura nas hierarquias que o Bridge soluciona ao preferir a composição em vez da herança?", options: [
        { text: "Resolve a indesejada 'explosão cartesiana de classes', que força a proliferação excessiva de novas subclasses caso queiramos expandir um objeto em um segundo eixo de variação simultaneamente.", correct: true, rat: "Exemplo Clássico: Se tivermos formas (Quadrado, Circulo) e formos aplicar uma cor via herança, obriga a criar dezenas de classes diferentes (QuadradoAzul, CirculoVermelho). O Bridge impede isso cortando a ligação rígida e colocando a cor como um agregado do objeto Forma." },
        { text: "Soluciona os problemas associados à falta de polimorfismo contidos em muitas bibliotecas padrão limitadas.", correct: false, rat: "O Bridge exige ativamente que exista capacidade de polimorfismo para existir." },
        { text: "Suprime a complexidade da utilização de constantes e de classes estáticas em uma rede local.", correct: false, rat: "As estáticas são escolhas do paradigma base; o problema não reside no contexto das estáticas vs ponte." },
        { text: "Descomplica algoritmos com múltiplas variáveis em cadeias sequenciais grandes.", correct: false, rat: "Isso tenderia a apontar para o Strategy na reorganização de funções ou o Chain of Responsibility." }
    ]},

    // 8. Composite
    { p: "Composite", d: "Fácil", q: "O padrão Composite é considerado ideal se aplicarmos o seu design em um formato de dados específico. Qual formato?", options: [
        { text: "Estruturas baseadas em uma árvore de nós e ramos para exprimir claramente hierarquias do tipo Parte-Todo.", correct: true, rat: "Permite ao cliente tratar folhas únicas ou sub-ramos (nós) de forma idêntica." },
        { text: "Listas encadeadas simples.", correct: false, rat: "Listas lineares não precisam do Composite." },
        { text: "Tabelas relacionais baseadas em chaves primárias.", correct: false, rat: "Isso diz respeito ao mapeamento objeto-relacional (ORM)." },
        { text: "Filas do tipo FIFO (First In, First Out).", correct: false, rat: "É uma estrutura de dados comportamental, não parte-todo." }
    ]},
    { p: "Composite", d: "Médio", q: "Para que o cliente interaja de forma uniforme com todos os elementos no padrão Composite, é fundamental que:", options: [
        { text: "Os objetos simples (folhas) e os contêineres (compostos) implementem a mesma assinatura de interface ou classe base abstrata.", correct: true, rat: "Desta forma, o cliente não precisa escrever código diferente, como 'if (objeto for um contêiner) {...}'." },
        { text: "O contêiner não possua métodos próprios, delegando tudo às folhas.", correct: false, rat: "O contêiner gerencia os seus filhos (add, remove) e implementa a operação de grupo." },
        { text: "Haja apenas uma única instância da árvore.", correct: false, rat: "Isto mistura-se com Singleton." },
        { text: "A árvore seja puramente binária.", correct: false, rat: "O Composite suporta n-filhos por nó." }
    ]},

    // 9. Decorator
    { p: "Decorator", d: "Fácil", q: "A frase clássica da intenção fundamental do padrão Decorator define-se por:", options: [
        { text: "Anexar novas responsabilidades estruturais ou lógicas em um objeto singular, dinamicamente em tempo de execução da aplicação.", correct: true, rat: "Em vez de mudar o esqueleto principal, cobre ou decora com um novo casaco por cima do anterior para ter mais funcionalidades do que a base que lhe foi atribuída." },
        { text: "Transmutar uma classe com falhas em uma nova classe de acesso remoto unificado.", correct: false, rat: "Mudar totalmente o destino refere-se claramente à formatação da ponte de um Adapter ou Proxy de redes." },
        { text: "Percorrer as sub-árvores complexas de estruturas de arquivos de modo sequencial linearizado a fim de facilitar pesquisas.", correct: false, rat: "Técnicas de travessia estão inseridas dentro do escopo comportamental dos Iteradores." },
        { text: "Congregar em um único local da arquitetura os códigos centrais do ciclo de configuração do sistema vital.", correct: false, rat: "Isto faria mais sentido na aplicação dos princípios associados ao controle global do Singleton." }
    ]},
    { p: "Decorator", d: "Médio", q: "Por que motivo o uso do padrão Decorator é largamente considerado nos cenários onde precisamos de múltiplas variações e comportamentos a juntar face ao uso estático de classes via Herança?", options: [
        { text: "Porque utilizar Herança nos obrigaria a desenvolver estaticamente inúmeras subclasses para garantir que as variadas combinações de funcionalidades pudessem ser suportadas (Explosão Combinatória de Subclasses).", correct: true, rat: "Com herança as classes são criadas e presas logicamente no momento da compilação. Com o decorador injetamos e tiramos comportamentos flexivelmente em run-time compondo objetos unificados livremente." },
        { text: "Porque os decoradores evitam o consumo intensivo e as chamadas sequenciais constantes à super-classe matriz e liberam, consequentemente, o fluxo central para interações do banco de dados local.", correct: false, rat: "O decorador delega e invoca muitas vezes a classe central adjacente para obter suporte nas funções, gerando diversas chamadas e delegações." },
        { text: "Visto que a interface exposta das sub-classes e os métodos privados não podem jamais se comunicar com o seu predecessor, tornando o uso de herança impraticável na arquitetura visual.", correct: false, rat: "Conceito estrutural errôneo. Os descendentes em heranças possuem acesso a todos os blocos públicos ou protegidos das super-classes associadas." },
        { text: "Uma vez que o padrão impõe e garante de forma automática uma sintaxe reduzida, escondendo explicitamente o objeto matriz.", correct: false, rat: "Decoradores frequentemente expõem os mesmos nomes de funções de acesso nativas. O intuito não é ocultar o tamanho original nem esconder a funcionalidade primária base." }
    ]},
    { p: "Decorator", d: "Difícil", q: "Para que o padrão Decorator funcione de forma verdadeiramente transparente para o código cliente que o consome, existe uma condição e exigência estrutural chave no seu design interno. Que exigência é essa?", options: [
        { text: "O objeto que serve de decorador (wrapper) e o objeto original que vai ser envolvido devem obrigatoriamente herdar ou compartilhar exatamente a mesma classe base ou a mesma interface de contrato.", correct: true, rat: "Apenas sendo do mesmo 'tipo' básico, o cliente pode passar um objeto limpo ou um objeto duplamente decorado para uma função, sabendo que ambos suportarão os métodos vitais que a função espera receber." },
        { text: "O decorador não pode conter referências diretas de estado; todas as características devem ser armazenadas em uma fachada independente unificadora.", correct: false, rat: "Os Decoradores mantêm internamente o ponteiro ou referência privada do objeto que englobam ativamente, podendo até eles mesmos manter variáveis exclusivas." },
        { text: "O Decorator é forçado a redefinir e ocultar os blocos protegidos e ignorar o comportamento principal das classes de implementação primárias.", correct: false, rat: "Ele repassa a invocação primordial para o original agregado e depois junta as suas valias adicionais." },
        { text: "Para ser imperceptível e coerente o objeto alvo não pode ter estado transitório; este necessita ser formatado via padrões da arquitetura criacional como imutável e Singleton permanente.", correct: false, rat: "A mutabilidade de estados lógicos não anula nem impede a construção em camadas feita pelas peças estruturais de um Decorator normal." }
    ]},

    // 10. Facade
    { p: "Facade", d: "Fácil", q: "Ao aplicarmos o padrão Facade (Fachada), a nossa principal intenção enquanto arquitetos visa que objetivo em um sistema?", options: [
        { text: "Criar uma interface superior, genérica e simplificada de modo a representar, de forma amigável, uma amálgama confusa, labiríntica e intrincada de interfaces pertencentes a um subsistema complexo.", correct: true, rat: "Protegemos e blindamos a equipe e o cliente, oferecendo uma recepção elegante onde eles interagem facilmente (com 2 ou 3 comandos), ocultando as dezenas de tarefas complexas que giram na retaguarda." },
        { text: "Sintetizar e criar uma barreira de segurança impenetrável onde nenhum componente original do motor possa ser acessado isoladamente.", correct: false, rat: "Uma Fachada ajuda, simplifica e agiliza; no entanto, nunca veta nem proíbe ativamente ou explicitamente os acessos isolados de quem quer interagir internamente no motor real do sistema." },
        { text: "Mudar instantaneamente os modelos e caminhos de um algoritmo base no exato momento que um cliente entra em uma função da interface.", correct: false, rat: "Substituição volátil do esqueleto foca nas prerrogativas de padrões baseados no Strategy." },
        { text: "Fazer buffer e aguardar atempadamente que uma enorme coleção de dados do usuário seja alocada internamente antes de ceder acesso às páginas visuais do controlador.", correct: false, rat: "Reflete dinâmicas transacionais do tipo Proxy Virtual (Lazy-load)." }
    ]},
    { p: "Facade", d: "Médio", q: "Ao optar por integrar um sistema de base através da arquitetura de Facade, a infraestrutura original interna e complexa que fica oculta perde a sua capacidade de ser usada e instanciada isoladamente por outros desenvolvedores veteranos que conheçam a API original?", options: [
        { text: "Não. A Fachada funciona de modo análogo a uma porta central de conveniência para uso comum; contudo, os componentes do subsistema original continuam inteiramente visíveis e acessíveis para todos aqueles que deles necessitarem.", correct: true, rat: "Não existe fechadura no padrão Facade GoF; é apenas um utilitário para facilitar a maioria dos casos de uso complexos da equipe." },
        { text: "Sim. Ao formular uma estrutura Facade, os mecanismos arquiteturais do padrão funcionam obrigatoriamente e exclusivamente em um modelo rígido idêntico ao de um Proxy de Proteção.", correct: false, rat: "Uma Fachada que se fecha e impõe bloqueios passa na sua plenitude para a esfera conceitual de um Proxy." },
        { text: "Sim. O conceito inerente força que todos os elementos e métodos originários que regem o subsistema se tornem forçosamente propriedades privadas isoladas pela linguagem.", correct: false, rat: "O Facade GoF é indiferente às redefinições e manipulações das diretivas de modificadores estáticos de classe (public/private/protected)." },
        { text: "Não bloqueia os acessos diretamente, mas exige à partida que toda a interação paralela que não utilize a fachada deva decorrer em contexto 'Apenas Leitura' (Strict Read-Only).", correct: false, rat: "As capacidades de edição (read/write) do interior subjacente jamais são adulteradas pelo Facade." }
    ]},
    { p: "Facade", d: "Difícil", q: "Analisando a intenção e a estrutura de alto nível entre o padrão Facade e o padrão Adapter, qual é o pilar conceitual que separa decisivamente a essência aplicacional destas duas arquiteturas de invólucro?", options: [
        { text: "O Facade tem como propósito desenhar e construir do zero uma nova interface, otimizada e simplificada, direcionada a cobrir por completo um subsistema ou rede de componentes; pelo seu lado, o Adapter tem a função de converter e amarrar uma interface velha em uma outra pré-existente e diferente, para que o cliente original a compreenda de imediato.", correct: true, rat: "Fachada = criar novo painel simplificado abrangendo muito. Adaptador = modificar o aspecto para coincidir com as exigências pré-estabelecidas e incompatíveis da peça ou componente de destino que não se podem comunicar sem um molde." },
        { text: "O Facade age única e exclusivamente de forma interligada na herança estrutural de Classes Superiores, por outro prisma o Adapter adota invariavelmente o caminho estrito da agregação de objetos.", correct: false, rat: "Ambas as abordagens aplicam frequentemente o conceito generalizado de Delegação e Associação." },
        { text: "Apenas os Adapter conseguem lidar com dados herdados das vertentes de Fábricas baseadas na criação unitária de protótipos de dados simples sem poluir as instâncias.", correct: false, rat: "Padrões criacionais podem entrosar e fundir-se perfeitamente com todas as vertentes estruturais do Catálogo GoF (incluindo as Fachadas)." },
        { text: "Apenas a forma sintática diverge nas linguagens modernas. Em questões e abordagens lógicas da arquitetura final moderna de um sistema o diagrama é, de fato, o mesmo em toda a literatura oficial.", correct: false, rat: "Discordância radical. Existem intenções diametralmente opostas que regem e validam a sua existência separada na bibliografia acadêmica e de software do Gang of Four." }
    ]},

    // 11. Flyweight
    { p: "Flyweight", d: "Fácil", q: "Qual o intuito fundamental a ter em conta e a principal promessa trazida pelo padrão de design arquitetural apelidado de Flyweight?", options: [
        { text: "Minimizar de forma expressiva o consumo de memória em tempo de execução num sistema, promovendo o compartilhamento inteligente do máximo volume de dados redundante suportável entre enormes quantidades de objetos.", correct: true, rat: "O padrão ('peso-mosca') dita um estado compartilhado (uma referência global de cor, imagem, tipo primário) mitigando a duplicação desmesurada e aliviando a carga excessiva na RAM." },
        { text: "Minimizar substancialmente e otimizar todo o timing de construção do build da equipe durante as fases de compilação da framework geradora do código na máquina local.", correct: false, rat: "Obrigação técnica alheia às dinâmicas operacionais pós-compiladas em tempo de execução regidas pela arquitetura Flyweight." },
        { text: "Suprimir gargalos severos de rede ao assegurar a latência base no transporte de requisições de bancos de dados locais.", correct: false, rat: "A sua eficácia prende-se à memória de processamento instantânea base do motor (Ex: Módulo RAM) e não sobre latências em transportes paralelos de rede." },
        { text: "Diluir rigidamente a delegação e o rastreio intrincado de competências compartilhadas dentro de ramificações que utilizam composições hierárquicas em árvore.", correct: false, rat: "Metodologia de organização alheia à otimização fina dos bytes, descrita de fato para a abordagem das árvores no Composite clássico estrutural." }
    ]},
    { p: "Flyweight", d: "Médio", q: "Com a finalidade de conseguir o máximo rendimento na sua atuação, o modelo Flyweight propõe e separa conceitualmente as informações armazenadas do objeto através de duas categorias estruturais. Identifique essa categorização:", options: [
        { text: "Uma vertente denominada de Estado Intrínseco (dados contidos internamente, imutáveis e constantes passíveis de se compartilhar livremente) e Estado Extrínseco (dados voláteis originados com base no contexto externo atual inserido dinamicamente no objeto).", correct: true, rat: "Aplicando num editor de texto: A informação de ter a letra 'A' em Arial como fonte é compartilhada (Intrínseco); Onde é colocada essa mesma letra e as suas coordenadas X e Y na tela seria o contexto (Extrínseco) imposto externamente." },
        { text: "A dicotomia alocada em Instâncias Globais Gerais (sempre presentes) bem como Variáveis Locais Compartilhadas associadas estritamente a métodos de encapsulamento.", correct: false, rat: "Foge em demasia do espectro arquitetônico, sem qualquer adesão técnica estrutural associada a conceitos GoF." },
        { text: "A polaridade que divide os recursos em Chaves Primárias Relacionais do lado ativo do repositório estático face aos Campos Secundários Transmutáveis alinhados na extremidade final nas instâncias da aplicação.", correct: false, rat: "Uso explícito de gramática aplicável apenas para descrições de modelos relacionais de bancos de dados e ORMs." },
        { text: "Formato paramétrico estático alocado diretamente nos clusters da memória compilada contrapondo em paralelo direto com valores de contexto originados de pilhas de injeção de dependência.", correct: false, rat: "Descontextualiza e enche a formulação de detalhes teóricos confusos não remetendo os termos clássicos estabelecidos para o conceito em Flyweight." }
    ]},
    { p: "Flyweight", d: "Difícil", q: "Em uma perspectiva holística de desenvolvimento, qual é a exigência primordial relativa ao estado 'intrínseco' de um Flyweight para que o seu compartilhamento entre dezenas de instâncias no sistema não cause efeitos colaterais catastróficos?", options: [
        { text: "O estado intrínseco que o objeto armazena internamente deve ser representativo de características estritamente comuns, e, de forma imperativa, deve ser imutável e cego a contextos do exterior após a sua criação estrutural de fábrica.", correct: true, rat: "Se os dados compartilhados pudessem ser adulterados (ex: uma classe altera o tamanho do modelo 3D comum de uma árvore), todo o restante universo virtual e instâncias que apontassem para esse molde iriam também colapsar ou ser adulterados involuntariamente em simultâneo." },
        { text: "Deverá forçosamente derivar e constituir uma herança de classe exclusiva restrita a tipos primitivos básicos (inteiros, booleanos), uma vez que a linguagem bloqueia falhas em primitivos durante a serialização.", correct: false, rat: "Incorreto. A teoria é válida e funcional quer utilizemos primitivos quer integremos sub-classes instanciadas ou abstrações complexas, desde que exista a ausência e restrição estrita de modificações pós-instanciação." },
        { text: "É estritamente obrigatório arquitetar os objetos sob as bases intrincadas de invocação por procuração em conjunto associado, suportando métodos restritivos no estilo Proxy de Proteção.", correct: false, rat: "O uso associado do Proxy pode gerar benefícios adicionais, mas a imutabilidade pura do estado interno é o pilar mestre isolado, independentemente da adoção de Proxies complementares." },
        { text: "Exige uma alocação isolada de memória de estado restritiva ao processo de um repositório interno estático em disco fixo do formato original compilado e desfasado da área temporal do host da rede global.", correct: false, rat: "Embuste gerado por acumulação excessiva de palavras técnicas inúteis. As normas limitam-se à imutabilidade em tempo real de aplicação e de RAM." }
    ]},

    // 12. Proxy
    { p: "Proxy", d: "Fácil", q: "Em suma e a título genérico, no campo dos padrões clássicos, como se comportam as matrizes delineadas num padrão Proxy?", options: [
        { text: "Funciona primariamente como um componente intermediador na corrente lógica, com a faculdade nativa fundamental de conseguir interceptar e gerenciar a totalidade das chamadas ao fluxo do serviço real ou objeto alvo adjacente.", correct: true, rat: "Serve como intermediário de passagem com o intuito claro de aportar ações auxiliares necessárias tais como registro (logging), validação pontual e carregamento tardio (lazy initialization) sem alterar a responsabilidade originária do alvo." },
        { text: "Comportam-se e impõem-se com força enquanto a nova porta ou classe que atua como modelo unificador de um conjunto denso e avassalador de subsistemas antigos e legados.", correct: false, rat: "As barreiras aglomeradoras com vista a promover facilidade visual e uniformidade recaem no design atribuído com justiça ao modelo estrutural comummente difundido na classe Facade." },
        { text: "Configuram-se perfeitamente e funcionam explicitamente para auxiliar nas exigências de agregação orgânica em listas ou nós em árvore, a fim de expor coleções simples e lineares e interligá-las num fluxo sequencial.", correct: false, rat: "As lógicas baseadas em listas estruturais remetem às teorias de Iterator e padrões do tipo Composite." },
        { text: "Promovem, garantem e emitem os eventos contínuos provenientes da fonte geral a fim de notificarem sem limite associativo a rede de clientes dispostos a reagir pontualmente a estes alertas.", correct: false, rat: "Intermediários passivos focados nos acessos diretos divergem categoricamente do modelo Publisher/Subscriber de compartilhamento de comunicação comportamental do Observer." }
    ]},
    { p: "Proxy", d: "Médio", q: "Conceitualizando os invólucros estruturais, qual o dilema de design evidente e a intenção crucial de distinção do Proxy face ao uso corrente da decoração via Decorator, sabendo de antemão que ambas se baseiam ativamente na ação de envolver componentes?", options: [
        { text: "O Proxy toma as rédeas das tarefas de CONTROLE do fluxo e ciclo vital da instância para barrar a acessibilidade indiscriminada; num prisma paralelo diametralmente oposto, a responsabilidade primordial imposta no Decorator incide em ANEXAR ativamente dinâmicas inéditas que antes não existiam associadas ao componente originário.", correct: true, rat: "Decoração injeta enriquecimento contínuo; As vertentes originadas via mecanismo de proxying geram policiamento de proteção, limitação pontual inteligente ou retardamento do ciclo lógico sem adição substancial de features de comportamento de negócio." },
        { text: "O Proxy obriga forçosamente à desconstrução formal global alterando a fachada da interface em todas as esferas base visíveis; já pelo contrário, o fluxo contido de decoração mantém a coerência base orgânica a nível visual imutável.", correct: false, rat: "A obrigatoriedade subentendida de mudança e descaracterização estrutural e formal da interface refere-se diretamente e aplica-se no contexto primordial abordado nos sistemas arquitetônicos de Adapter." },
        { text: "O design do Proxy encontra o seu fundamento primordial inseparável ligado visceralmente no polimorfismo contido na restrição da Herança simples para poder funcionar, face à premissa essencial de Associação do Decorator.", correct: false, rat: "Pelo paradigma imposto, de forma global a norma geral para invólucros dinâmicos (tanto Proxy como Decorator) recai pesadamente nos domínios da agregação estrutural (Composição/Delegação)." },
        { text: "Não existem distinções base de mérito aplicacional de fato impostas originariamente nas definições dogmáticas do agrupamento originário que validem a sua separação no desenvolvimento teórico e literário do GoF.", correct: false, rat: "A academia e o grupo Gang of Four demarcou vincadamente e exaustivamente as intenções intrínsecas opostas e os eixos que guiam o uso formal do proxy em contraposição da decoração." }
    ]},

    // --- BEHAVIORAL PATTERNS ---
    // 13. Chain of Responsibility
    { p: "Chain of Responsibility", d: "Fácil", q: "Ao optar e instanciar um modelo comportamental apoiado sobre a alçada fundamental da 'Chain of Responsibility' (Cadeia de Responsabilidade), que desvantagem clássica do acoplamento se tenta categoricamente diluir face ao paradigma linear simples?", options: [
        { text: "Diluir intensivamente a necessidade do componente (remetente) saber com exatidão e precisão rigorosa qual será o objeto concreto exato do sistema subjacente que efetivamente irá resolver e gerenciar a sua solicitação base inicial.", correct: true, rat: "No limite base, garante que atiremos os eventos à grelha conectada aguardando tranquilamente pelo elemento pontual que assuma a premissa de que consegue resolver ou responder; os sistemas ignoram a referência forte a atenuam os vínculos." },
        { text: "Abstrair ativamente todo e qualquer estado interno transitório instável em blocos rígidos contínuos que formem fluxos idênticos entre os pares base num contexto global para aliviar a carga da memória do servidor principal.", correct: false, rat: "Um erro gerado usando verbosidade desconexa e focado em referências físicas indevidas sem qualquer ponte de realidade teórica." },
        { text: "Conceber blocos abstratos lineares sem a possibilidade do recurso intrínseco ao uso contínuo de polimorfismo base para evitar erros de compilação da máquina virtual do sistema.", correct: false, rat: "Linguagem confusa a gerar falsa validação técnica estrita sobre falhas que o padrão necessita forçosamente (polimorfismo é vital para processar o contrato e avançar ao próximo objeto na cadeia)." },
        { text: "Conduzir as hierarquias isoladamente por caminhos binários estáticos para que seja garantida a interconexão estrutural base num cluster de rede relacional contínua de um banco de dados restrito.", correct: false, rat: "Completamente ininteligível, juntando bancos de dados e redes a padrões comportamentais base isolados sem qualquer conexão." }
    ]},
    { p: "Chain of Responsibility", d: "Médio", q: "No decurso natural imposto pelos fluxos contínuos estruturais da Cadeia, que resultado se torna manifestamente convencional caso uma requisição atravesse os blocos ligados ininterruptamente alcançando um hiato final sem que absolutamente nenhum objeto englobado na malha adote competência ou interesse face aos dados para executar a operação?", options: [
        { text: "Convencionalmente nos moldes base associados, a chamada perde-se ativamente na interrupção ou acaba rejeitada e largada (não tratada organicamente); a menos que seja desenhada e providenciada uma captura (fallback ou default) à prova de quebras no final da corrente.", correct: true, rat: "A rede subjacente não compartilha inerentemente garantias explícitas absolutas base para tratar os pedidos, necessitando os desenvolvedores ativamente de um mecanismo isolado (catch-all handler) associado na via para suprir a omissão da operação." },
        { text: "As engrenagens passivas disparam alertas estruturais no elo central que encaminham ciclicamente para a cabeça de ponte da ramificação obrigando o gerador base do pedido inicial a abortar ininterruptamente e a recomeçar num loop fechado primário garantido.", correct: false, rat: "Não ocorrem em momento algum laços estruturais forçados do tipo loop automático base sem injeção estrita exterior, constituindo essa hipótese uma falha drástica gravosa de concepção da lógica funcional." },
        { text: "Acontece ininterruptamente sob pena severa do modelo, originando exceções estritas irreversíveis impeditivas ('NullReference' ou 'PointerFault') fechadas e não passíveis de exceção controlada no núcleo basilar do código nativo paralelo.", correct: false, rat: "Só ocorrerão erros sistêmicos deste porte se o desenvolvedor esquecer de prever a verificação do próximo receptor na cadeia nativa (verificando se next_handler != null)." },
        { text: "Pela norma comportamental restrita no princípio da inversão, a base de entrada inicial encarrega-se em forçar ininterruptamente o bloqueio secundário isolado, ditando a penalização originária estrita ao primeiro elemento restrito local do bloco que falhou ativamente no fluxo orgânico.", correct: false, rat: "Nenhum elemento passivo é responsabilizado e forçado a reter o bloqueio num formato originário punitivo base estrito numa estrutura sem vínculo de posse; sendo o repasse e abstenção o propósito nativo principal natural subjacente da rede." }
    ]},

    // 14. Command
    { p: "Command", d: "Fácil", q: "Ao analisar o padrão Command na sua estrutura global, como é que este afeta e trata de forma fundamental um pedido ou uma simples rotina imposta?", options: [
        { text: "Atua ativamente encapsulando e enclausurando o conjunto e os parâmetros estritos da ação primária inicial da intenção requerida para a converter autonomamente numa entidade (um objeto standalone contido e autônomo) passível e estruturado para ser transitado e executado na grelha contínua do tempo.", correct: true, rat: "Transformando ativamente um simples método vazio num Objeto estático e orgânico isolado ganha-se espaço e liberdade ativamente de agendá-lo, enfileirá-lo e adiá-lo indefinidamente na grelha sem colapsar a via originária base nativa e sem forçar a imediatez e rigidez associada." },
        { text: "Consome e suprime a volatilidade inerente base convertendo obrigatoriamente e isoladamente os métodos estáticos abstratos de funções temporárias em um modelo relacional rígido focado estritamente em bancos de dados relacionais.", correct: false, rat: "A descrição opõe-se integralmente aos fatos base, sendo o próprio encapsulamento focado na instância contida viva, e nunca orientada rigidamente a modelos globais contínuos de tabelas de banco de dados." },
        { text: "Associa-se passivamente restringindo e amarrando rigidamente a base dos invólucros gráficos aos botões isolados frontais estritos que geram e disparam fisicamente com as lógicas nativas originárias num caminho sem qualquer isolamento originário entre componentes e lógica restrita.", correct: false, rat: "Na prática a dissociação das ordens geradas na interface das execuções e lógicas de fundo de domínio é uma promessa de arquitetura garantida e assegurada precisamente através da inserção do padrão abstrato Command na arquitetura matriz local restritiva." },
        { text: "Registra passivamente no repositório matriz isolado do sistema local as variáveis orgânicas transitórias nativas temporárias da memória RAM associativa do host do servidor originário abstrato, em total detrimento prático dos componentes abstratos lógicos nativos e orgânicos restritos paralelos do processo base.", correct: false, rat: "Totalmente ausente de valor lógico e conceitual aplicacional em relação ao padrão em análise." }
    ]},
    { p: "Command", d: "Médio", q: "Em implementações de software avançadas, o padrão Command é a espinha dorsal de qual funcionalidade chave?", options: [
        { text: "Operações de 'Desfazer' (Undo) e 'Refazer' (Redo). Ao gerarmos ativamente pilhas sequenciais (histórico) que aglomeram estes comandos isolados e instanciados podemos acionar inversões diretas com extrema eficiência base.", correct: true, rat: "A abordagem é amplamente utilizada em editores textuais ou softwares de gráficos vetoriais onde os métodos de restauro invocam na ordem estrita do histórico gerado e gravado passivamente a contra-operação associada inserida originariamente na instância encapsulada contínua primária." },
        { text: "Os mecanismos rígidos orgânicos de pesquisas nativas em massa alocados no servidor central de rede de dados globais isolados, onde a indexação das chaves se torna base essencial passiva primária.", correct: false, rat: "A indexação e pesquisa global estrita recaem primordialmente em algoritmos puros associativos de tratamento de strings e procura de árvores, em nada remetendo aos blocos paralelos independentes de execução dos Comandos estruturais isolados base nativos." },
        { text: "As transições animadas fluidas de instâncias ou nós gráficos contínuos estritos na matriz restrita base visual estrita contida ininterruptamente na área paralela de base nativa originária estática na memória abstrata local associada passiva no dispositivo primário da tela.", correct: false, rat: "Rotinas inerentes de interpolações visuais base não decorrem estruturalmente nem são alvo passivo abstrato base primário originário isolado central estrito na finalidade comportamental fechada paralela estruturada imposta inerentemente pelas abstrações passivas base do Command." },
        { text: "A liberação automática estrita cíclica paralela da memória virtual residual nativa transitória contínua paralela associativa orgânica isolada que evita rupturas severas na pilha primária originária passiva paralela subjacente estática gerida ativamente no interior isolado primário (Garbage Collector).", correct: false, rat: "Isso abrange as dinâmicas físicas associativas de gestão contínua restrita base associada ativamente aos algoritmos internos base do núcleo passivo e processos de baixo nível da Máquina Virtual estrita ou Garbage Collectors nativos, nunca dependente estrutural associado às normas primárias da programação do Command." }
    ]},

    // 15. Interpreter
    { p: "Interpreter", d: "Fácil", q: "Qual a finalidade central para a qual o padrão Interpreter foi idealizado na arquitetura base do software clássico?", options: [
        { text: "Criar uma representação da gramática e desenhar paralelamente um interpretador para avaliar, decodificar ou resolver rotinas formadas por sentenças estruturadas presentes num dialeto lógico, numa linguagem reduzida base, ou numa expressão regular de procura abstrata.", correct: true, rat: "O objetivo é dotar e fornecer a um componente base as chaves precisas para ler e processar blocos inteiros associativos (frequentemente representados numa Domain Specific Language) que necessitem de parse contínuo." },
        { text: "Garantir a transformação base nativa de compilação rigorosa entre dois paradigmas longos de código fonte original associado (por exemplo de C++ direto para Java isolado principal).", correct: false, rat: "Trata-se do funcionamento complexo base originário abstrato focado ativamente nos trâmites de alto porte dos Compiladores estritos paralelos ou em Transpilers restritivos completos e não da intenção base originária de pequena ou média dimensão de avaliação sintática associativa do Interpreter." },
        { text: "Transmutar instantaneamente as matrizes dinâmicas abstratas na representação matriz estática contínua da estrutura das bases passivas restritivas do servidor, tela e interface primária de acordo estrito e absoluto face com os constrangimentos geográficos temporários das zonas originais e linguagem natural do usuário (tradução).", correct: false, rat: "As transições linguísticas ou de aspectos estéticos baseadas na proveniência da cultura enquadram-se na rubrica estática de Localização (l10n) e Internacionalização (i18n), afastando-se em definitivo estrutural base orgânico originário do papel principal de avaliação sintática técnica do Interpreter." },
        { text: "Controlar e restringir o tráfego estático originário associativo nativo contínuo e orgânico abstrato paralelo e isolar a taxa paralela contínua transitória original abstrata passiva associada contínua primária estrita subjacente original de acessos à via primária.", correct: false, rat: "Descreve tangencialmente os efeitos ou funções restritivas estritas e lógicas do Proxy orgânico ou Facade passiva estrita, sem contato abstrato passivo central de base com interpretação primária estrita semântica de regras subjacentes do Interpreter nativo." }
    ]},
    { p: "Interpreter", d: "Médio", q: "A estrutura do padrão Interpreter recorre habitualmente a que outro padrão de design conhecido para representar as suas regras em memória, criando a chamada 'Abstract Syntax Tree' (Árvore de Sintaxe Abstrata)?", options: [
        { text: "Padrão Composite.", correct: true, rat: "Dado que as expressões de uma linguagem costumam ser divididas hierarquicamente entre 'Regras Simples' (Elementos Terminais) e 'Regras Complexas que agrupam regras mais simples' (Não-terminais), a construção encaixa perfeitamente no modelo estrutural de Árvore Parte-Todo (Composite)." },
        { text: "Padrão Facade.", correct: false, rat: "O Facade não possui propriedades organizativas e hierárquicas adequadas nem é capaz de estruturar regras em camadas independentes avaliáveis do mesmo modo e escala associativa restrita contínua abstrata." },
        { text: "Padrão Memento.", correct: false, rat: "Trata e lida apenas restritivamente com instâncias abstratas temporárias guardadas para preservar os retornos a registros passados num fluxo local associativo." },
        { text: "Padrão Proxy.", correct: false, rat: "Excepciona-se em definitivo, pois trata exclusivas e restritivas validações passivas abstratas isoladas contínuas ou de representação passiva secundária sem ligação com representação de sentenças hierárquicas." }
    ]},

    // 16. Iterator
    { p: "Iterator", d: "Fácil", q: "Qual é o principal ganho estrutural que advém da integração do padrão Iterator numa coleção de objetos?", options: [
        { text: "Permite oferecer e expor uma abordagem genérica, linear e contínua para percorrer os itens passo a passo sem expor ou obrigar o cliente externo a compreender os blocos intrincados estritos que regem e suportam a organização estrutural (Array, Árvore, Lista, Hash) da coleção interna associativa subjacente originária.", correct: true, rat: "O usuário e consumidor (cliente) do iterador apenas invoca 'temProximo()' e 'proximo()', independentemente se os dados estão armazenados numa teia hierárquica complexa associada fechada ou apenas e linearmente inseridos na memória local contínua subjacente." },
        { text: "Potenciar na arquitetura estática abstrata contínua passiva nativa e garantir ciclicamente nos processos de base secundários associativos ininterruptos a construção originária estrita associada fechada originária base de loops contínuos passivos nativos originais assíncronos que não exigem término natural temporal.", correct: false, rat: "O iterador não gera laços puros e estritos temporários que prescindem de término ('while true'); facilita a navegação contínua orgânica passiva apenas da estrutura isolada restritiva subjacente estrita paralela secundária original passiva." },
        { text: "Ordenar e indexar passivamente ininterruptamente e reestruturar ativamente e paralelamente a grelha originária restrita estrita nativa fechada isolada secundária do servidor base local subjacente primário originário secundário orgânico fechado primário contínuo temporário restritivo interno em matrizes e coleções base estruturais temporárias passivas de chaves e alocações locais.", correct: false, rat: "Iteradores limitam-se restritivamente na teoria base originária a ler e processar os fluxos associativos dos registros, sendo a responsabilidade estrutural contínua e a ordenação puramente tarefas independentes relativas às funcionalidades dos contêineres estritos." },
        { text: "Provocar e impor garantidamente um mecanismo base isolado de segurança originária ininterrupta passiva originária fechada e intransponível em tempo estático fechado contínuo real nas camadas estritas passivas associativas de cópia nativa base das tabelas relacionais primárias temporárias fechadas.", correct: false, rat: "As promessas de segurança imutável estrutural fogem da responsabilidade comportamental dos iteradores; sendo as técnicas de Copy-On-Write estritas isoladas restritivas das classes de base relacional abstrata passiva associativa contínua originária central primária do domínio de design paralelo fechado secundário." }
    ]},
    { p: "Iterator", d: "Médio", q: "Qual a vantagem inerente e estrutural basilar advinda de ser o objeto externo especializado (o Iterador) e não a própria classe recipiente estrita originária (Coleção) a armazenar e conter a gestão estrita ativa da posição ou cursor base atual relativo à navegação contínua associativa da lista?", options: [
        { text: "Possibilita ativamente o início, processamento e a sustentação contínua de várias travessias (Iteradores) e buscas concorrentes distintas estritas de navegação isoladas, contínuas e simultâneas independentes que processam a coleção base sem atropelos, visto que os estados correntes estritos relativos encontram-se isolados forçosamente em cada objeto iterador independente paralelo.", correct: true, rat: "Se a coleção passiva estrutural primária originária abstrata mantivesse o contador ou cursor base isolado paralelo do processo, dois processos a lerem a coleção ao mesmo tempo causariam garantidamente uma falha associativa estrita na mesma variável restritiva colidindo no espaço contínuo abstrato de busca." },
        { text: "Reduz drasticamente o consumo e esforço base orgânico contínuo primário estático abstrato isolado nativo na camada local subjacente abstrata da memória passiva estrita RAM estática local da coleção de dados fechada original do processo associativo paralelo de base local relacional contínuo.", correct: false, rat: "Manter múltiplos objetos paralelos pequenos consumirá marginalmente mais bytes e RAM orgânica passiva do que manter contadores intrínsecos de base originária secundária fechada no contêiner estrito local associado." },
        { text: "Prepara garantidamente as premissas originárias das camadas contínuas associativas nativas paralelas fechadas associativas da base para a serialização estrita limpa passiva automática estrita original e armazenamento seguro nativo passivo original associado estrutural de disco secundário contínuo estrito.", correct: false, rat: "O iterador abstrato orgânico contínuo é agnóstico nas operações fechadas originárias paralelas associativas de transporte físico e serializações da linguagem do processo associado original." },
        { text: "Garante ininterruptamente a isenção de lógica comportamental estrita original nativa nas subclasses de base originária paralela contínua originárias associativas da coleção nativa fechada associada base abstrata paralela original secundária restrita abstrata temporária do servidor passivo originário.", correct: false, rat: "As classes associativas passivas geradoras de base secundária fechada original necessitam sempre ativamente originariamente na sua implementação de gerenciar os métodos construtores abstratos estritos 'createIterator()' estritos locais fechados de acordo com a premissa de herança paralela associativa orgânica contínua abstrata original nativa estrita do padrão." }
    ]},
    { p: "Iterator", d: "Difícil", q: "Em que cenário de concepção a aplicação do padrão Iterator se revela indispensável para manter o baixo nível de acoplamento do sistema?", options: [
        { text: "Quando um sistema cliente genérico necessita percorrer diversas estruturas de dados completamente diferentes (como listas encadeadas, árvores binárias ou matrizes bidimensionais complexas) sem que o seu código passe a depender ou a ter de importar as classes concretas dessas mesmas estruturas estruturais.", correct: true, rat: "A abstração permite que o algoritmo consumidor itere e analise componentes sem ser obrigado a lidar com as amarras das implementações nativas." },
        { text: "Quando é estritamente obrigatório ordenar os elementos de grandes repositórios de banco de dados usando chaves e campos dinâmicos antes que os dados alcancem a cache originária secundária.", correct: false, rat: "A ordenação dos registros subjacentes não integra o domínio estrutural base nem a vocação primordial atribuída à leitura sequencial do Iterator." },
        { text: "Sempre que os objetos consumam mais de 4 gigabytes de RAM abstrata na carga passiva primária e obriguem à divisão em lotes (pagination) assíncronos geridos do lado do servidor associado local temporário isolado orgânico paralelo.", correct: false, rat: "Apesar da paginação ajudar em blocos pesados de dados, a obrigação e o foco do Iterator não se resumem nem se relacionam categoricamente com limites volumétricos originários estáticos de consumo base de memória do processo orgânico subjacente nativo." },
        { text: "Numa eventualidade estrita em que o polimorfismo contínuo esteja bloqueado por razões nativas estruturais associativas da framework subjacente, sendo preciso o uso imperativo e central do Iterator para realizar cópias estáticas do array no formato estrito e paralelo fechado de clonagem orgânica temporária.", correct: false, rat: "O Iterator necessita ele próprio do recurso do polimorfismo estrutural abstrato originário para entregar a flexibilidade exigida pelo padrão GoF original focado; iteradores não se ocupam isoladamente dos mecanismos de clonagem de memória restritiva da classe estática." }
    ]},

    // 17. Mediator
    { p: "Mediator", d: "Fácil", q: "A função basilar do padrão Mediator numa estrutura de programação é:", options: [
        { text: "Centralizar o fluxo, as interações lógicas e a comunicação confusa contida entre uma coleção de objetos complexos e aglomerados, promovendo assim o enfraquecimento das suas dependências mútuas.", correct: true, rat: "Exemplo vivo e clássico: Em vez de 10 botões e janelas de interface gráfica saberem da existência uns dos outros, todos enviam as informações diretas para um controlador comum que gerencia quem deve acender ou apagar." },
        { text: "Transformar formatos díspares contínuos e fechar os arquivos de base orgânica e convertê-los em relatórios abstratos temporários associativos unificados semânticos.", correct: false, rat: "As transições ligadas ativamente a formatação paralela são atributos intrínsecos e primários do domínio estrutural associado base inerente de adaptadores paralelos e geradores associados secundários da formatação Builder estrito." },
        { text: "Garantir a salvaguarda estrita e imutável passiva estática de transações pendentes nativas de modo a possibilitar ininterruptamente atuar como um fallback para 'Undo' original passivo seguro e nativo secundário.", correct: false, rat: "Essas metodologias referem-se estritamente à dinâmica compartilhada de preservação e retoma originária asseguradas pelas abstrações base no Memento nativo e pelas ações geradas base na estrutura do Command paralelo." },
        { text: "Ocultar os arquivos subjacentes e proteger passivamente de acessos não pretendidos a base originária associada paralela relacional orgânica das classes centrais estritas do motor nativo original abstrato base local.", correct: false, rat: "A segurança nativa estrita e os aspectos passivos restritos do bloqueio associado da arquitetura remetem-nos para padrões geradores estruturais do universo de Proxy." }
    ]},
    { p: "Mediator", d: "Médio", q: "No momento em que adotamos as práticas e a arquitetura delineada do Mediator numa teia intrincada originária contínua, o design estrito isolado estrutural base dos vários componentes orgânicos colegas transita obrigatoriamente de um formato de teia intrincada ('muitos-para-muitos') para qual modelo referencial base?", options: [
        { text: "Para uma configuração ou estrutura puramente 'Um-para-muitos' centralizada (como uma topologia de Estrela fechada), na qual todos os colegas respondem apenas ativamente e dependem estritamente do vínculo associativo do seu mediador estrito designado abstrato.", correct: true, rat: "Isso reduz a complexidade combinatória e exponencial do código orgânico, assegurando e incrementando passivamente o reaproveitamento contínuo base da lógica individual originária sem amarras." },
        { text: "Para um ambiente nativo gerador puramente polimórfico fechado restrito e estático contínuo secundário local sem dependências externas relacionais do serviço.", correct: false, rat: "A dependência passiva e orgânica contínua não cessa de existir; apenas é canalizada para um eixo único, logo, não é puramente estático sem dependências base." },
        { text: "Transita unicamente de uma estrutura de classes primárias associativas puras de base temporal original para bases de instâncias singulares restritivas contínuas que aplicam imutabilidade restrita associativa secundária.", correct: false, rat: "O paradigma base relacional nativo não requer instâncias estáticas; o padrão exige o reencaminhamento comportamental isolado do tráfego interno base orgânico contínuo." },
        { text: "Para configurações sequenciais fechadas contínuas do modelo clássico original puro binário isolado nativo secundário associativo das estruturas estritas primárias passivas geradoras de árvores base paralelas isoladas do padrão.", correct: false, rat: "Converte para estrela passiva abstrata, não existe relação intrínseca que as converta ativamente a uma árvore base de ramificação estrita associativa dupla fechada no formato subjacente original de estrutura." }
    ]},

    // 18. Memento
    { p: "Memento", d: "Fácil", q: "A aplicação do padrão Memento serve a que finalidade direta na estrutura de base orgânica e temporal das aplicações lógicas?", options: [
        { text: "Capturar em segurança e manter devidamente externalizado um retrato pontual (Snapshot) do estado e das variáveis do objeto originário para lhe proporcionar um ponto de restauro contínuo subjacente ou seguro no percurso associativo original da execução.", correct: true, rat: "Age no sistema como o alicerce confiável e robusto para funções base que permitam viajar no fluxo orgânico contínuo e voltar a um momento exato da via inicial associada original." },
        { text: "Adiar a formação e o carregamento do pacote primário originário da classe contínua na via RAM do sistema secundário associativo da arquitetura paralela estática até estrita e imperativa necessidade original invocada base associada originária.", correct: false, rat: "Isso constitui a finalidade natural clássica dos proxys de carga temporária passiva originária nativa (Lazy Load)." },
        { text: "Decodificar ininterruptamente a camada linguística e avaliar algoritmos nas árvores originárias associativas base compostas das regras temporais da interface contínua paralela.", correct: false, rat: "As funções orgânicas de decodificação paralela e avaliação sintática isolada constituem ativamente parte essencial do núcleo do Interpreter associativo estrito." },
        { text: "Propagar um aviso aos pares na via nativa primária de todos os canais fechados secundários assim que ocorra qualquer oscilação estrita associativa nas propriedades do nó matriz associado primordial fechado.", correct: false, rat: "As difusões compartilhadas e alertas constituem a alma estrutural relacional do modelo comportamental originário passivo no Observer paralelo estrito nativo contínuo original." }
    ]},
    { p: "Memento", d: "Médio", q: "A estrutura do padrão Memento divide a sua responsabilidade em três partes ou peças conceituais essenciais. Quais são essas figuras fundamentais do design?", options: [
        { text: "O Originador (o dono passivo e original que molda o estado), o Memento (o recipiente dos dados) e o Zelador ou Caretaker (a entidade contínua passiva gestora que arquiva ou guarda em acervo os dados estruturais estritos sem examinar ou analisar o seu formato orgânico associativo).", correct: true, rat: "A garantia é que o Zelador estrito paralelo originário apenas faça a gestão abstrata estrita temporal da pilha dos Mementos passivos e fechados sem abrir para ler o conteúdo ou perverter a via e quebrar ativamente a proteção restrita original subjacente imposta pela cápsula." },
        { text: "A Fábrica Principal, o Diretor abstrato e a Representação Final paralela contínua de peças abstratas isoladas originárias secundárias passivas associativas base.", correct: false, rat: "Estes membros agrupam as matrizes subjacentes estritas originais focadas nas construções passivas e complexas do modelo de geração de Builder." },
        { text: "O Cliente Nativo estrito local fechado associativo contínuo paralelo originário, O Contexto Passivo Abstrato da Estratégia e a Família de Algoritmos abstrata contínua relacional.", correct: false, rat: "Descrevem categoricamente a organização estrita passiva original inerente ao núcleo comportamental focado na abordagem associada primária das estratégias de fluxo do Strategy." },
        { text: "O Nó Originário Abstrato da classe estática base passiva contínua, O Ramo estrutural fechado temporário do motor relacional orgânico nativo original primário da interface associativa e a Folha terminal primária do agrupamento contínuo.", correct: false, rat: "Integram e suportam ativamente a composição estrita arbórea restrita passiva originária associada fechada paralela do conceito contido no modelo Composite de base secundária passiva abstrata local paralela do ambiente de interface da arquitetura secundária temporária orgânica." }
    ]},
    { p: "Memento", d: "Difícil", q: "No plano teórico, o que diferencia de forma clara a intenção superior do padrão Memento de simplesmente pedir à classe para gerar e devolver uma simples cópia pública ('clone') dos seus atributos ou instâncias atuais?", options: [
        { text: "A grande valia e promessa do Memento garante estritamente que a estrutura, o histórico das chaves privadas e o estado do objeto alvo sejam arquivados, compartilhados externamente e gerenciados através de intermediários, operando isto tudo sem requerer em circunstância alguma a exposição orgânica das suas variáveis interiores abstratas ou quebrar os alicerces protetores paralelos associativos inerentes ao seu encapsulamento estrutural orgânico base.", correct: true, rat: "Num clone normal os atributos poderiam acabar passíveis de serem lidos indiscriminadamente por quem guardasse o backup da cópia; o Memento usa interfaces restritas (na sua versão mais rigorosa) onde só o dono tem a chave e interface que compreende o seu restauro base passivo contínuo e leitura originária." },
        { text: "Baseado puramente no fato estrutural que o 'Clone' necessita indubitavelmente da invocação de polimorfismo complexo para criar cópias associativas de hierarquias da memória, o Memento em antítese foge categoricamente estritamente do polimorfismo isolando-se das heranças base num pacote vazio contínuo associativo restrito abstrato.", correct: false, rat: "Ambas as via orgânicas primárias subjacentes nativas base recorrem e podem conviver estritamente com estruturas base originárias fechadas passivas e com ramificações das hierarquias associativas de polimorfismos da interface originária contínua paralela orgânica da arquitetura do compilador primário." },
        { text: "Visto que o método básico comum de cópia expõe apenas referências isoladas e ponteiros abstratos fracos base contínuos da localização e endereço restritivo passivo originário de memória na grelha estática passiva sem transmutar os dados primários estáticos.", correct: false, rat: "Um clone completo originário (Deep Copy nativo fechado) atua clonando inteiramente as matrizes originais relativas com exatidão tal como um Snapshot fechado original subjacente contínuo, a divergência reside imperativamente em garantir estritamente a ocultação da visibilidade passiva estrutural na classe (encapsulamento original contínuo passivo abstrato)." },
        { text: "Na estrita medida em que apenas a implementação orgânica das bases de um Memento nativo se submete ao processamento estático paralelo multithread passivo sem risco natural base originário isolado associado à contenção e restrição inerente contínua orgânica.", correct: false, rat: "Cópias e instâncias clone originárias operam nativamente a salvo em canais paralelos assíncronos restritivos contínuos passivos, dado que criam matrizes de dados originárias desfasadas de memória independente base associativa contínua, logo esta métrica não constitui o baluarte e fator base estrito nativo do Memento contínuo isolado original." }
    ]},

    // 19. Observer
    { p: "Observer", d: "Fácil", q: "Qual a regra conceitual principal e a intenção de fluxo regente num padrão de características clássicas do Observer?", options: [
        { text: "Estruturar ativamente a relação base numa malha que assume nativamente a interdependência e a notificação passiva de um emissor central num modelo puro 'um-para-muitos'; no qual se o componente mestre (Sujeito) altera a sua condição ou estado, todos os interessados (Listeners/Ouvintes) associados que a ele se inscreveram acabam prontamente advertidos.", correct: true, rat: "Esta rotina serve o âmago primário associado aos conceitos e abordagens restritivas comuns aplicadas estritamente em modelos genéricos reativos passivos nativos associados, ouvintes originais e mecanismos event-driven." },
        { text: "Obrigar estritamente o cliente orgânico remoto paralelo e fechado a acessar o modelo via abstração contínua originária unificadora restritiva passiva no padrão associativo do servidor de interface do controlador e fechar todos os acessos do núcleo primário principal.", correct: false, rat: "Criar passivamente blocos associados ou barreiras simples unificadoras num esquema subjacente nativo foca ativamente a intenção primária base paralela contínua originária abstrata de uma estrutura base em padrão Facade contínua isolada." },
        { text: "Inserir responsabilidades dinâmicas passivas contínuas subjacentes da classe originária primária fechada orgânica associativa nos limites operacionais do esqueleto sem obrigação abstrata passiva estrita do sistema estático de invocar polimorfismos e heranças passivas nativas originais base.", correct: false, rat: "Anexar características estruturais não vinculadas organicamente à herança reflete a premissa de atuação originária estrita passiva local base dos domínios da arquitetura focada orgânica original do Decorator contínuo primário estrito." },
        { text: "Compor ativamente as propriedades e coleções restritas locais primárias de dados na árvore de base associativa de forma uniforme originária da ramificação orgânica paralela nativa de agrupamento estrito passivo no servidor.", correct: false, rat: "Tratar e agrupar componentes originários estruturais paralelos estritos em coleções unitárias e uniformes subjacentes define abstratamente os propósitos originais essenciais passivos originários associados orgânicos base ao padrão do Composite." }
    ]},
    { p: "Observer", d: "Médio", q: "Quando o 'Subject' dispara um alerta orgânico associativo (trigger) pela sua rede originária contínua base passiva fechada de seguidores na via, em teoria qual é a dicotomia comum orgânica adotada nos paradigmas do compartilhamento de dados?", options: [
        { text: "Deparamo-nos estritamente com dois modos: No Modelo 'Push' (o componente origem força ativamente o envio completo da informação de detalhe e anexa a matriz dos dados diretamente no evento inicial de alerta) contraposto à estrutura base paralela de um Modelo 'Pull' (na qual a recepção abstrata contínua limita-se passivamente a avisar no bloco fechado contínuo inicial do evento o que mudou forçando ativamente o interessado e observador paralelo a invocar um método extra base para extrair os dados da modificação).", correct: true, rat: "O modo Pull promove ativamente um vínculo estreito contínuo e limpo no tráfego primário na rede da memória local, já o Push alivia organicamente as dependências estruturais visto não forçar o observador original a referenciar passivamente e focar o Subject estrito primário associativo base para obter a sua mensagem nativa." },
        { text: "As metodologias orgânicas base nativas e associativas focadas no contexto transitório das abordagens passivas originais Síncronas abstratas passivas paralelas contínuas e Assíncronas passivas associativas base nativas contínuas estruturais.", correct: false, rat: "Apesar de válidas na premissa aplicacional e execução de tempo das instâncias nativas estritas do código, no contexto puro e genérico da formulação arquitetural descritiva GoF original as mecânicas denominam-se estritamente por push e pull das matrizes relacionais abstratas associativas primárias." },
        { text: "No modelo restritivo paralelo orgânico nativo isolado Passivo, onde os dados primários transitórios originais se limitam ao seu envio contínuo orgânico da memória e no modelo Restritivo Abstrato original isolado Ativo, da classe subjacente orgânica contínua temporária paralela associada estrita nativa fechada associativa passiva da base relacional fechada estrita.", correct: false, rat: "Denominações falsas inseridas com caráter puramente confuso da matriz estrutural paralela original do motor sem qualquer lastro original estrito nas abordagens originais abstratas da documentação de software." },
        { text: "Dicotomia estrutural relacional de base Proxy nativo passivo de tráfego temporário estrito restritivo ou da arquitetura de base temporal fechada Decorator nativo abstrato associativo fechado contínuo originário local da ramificação de fluxo associado contínuo abstrato.", correct: false, rat: "Confusão e aglutinação nativa originária passiva paralela de outros padrões arquiteturais base completamente não relacionados à tipologia contínua abstrata fechada passiva do padrão subjacente primário estrito orgânico em causa comportamental." }
    ]},
    { p: "Observer", d: "Difícil", q: "Qual a estratégia fundamental de design adotada e recomendada pelo padrão Observer que lhe permite criar e assegurar o tão exigido e valioso baixo nível de acoplamento da aplicação principal que gera os eventos entre si e o lado oposto da estrutura que reage e absorve ativamente esses dados (os Observers)?", options: [
